# Build: every push
# Publish: git tag v*.*.* — uses npm Trusted Publishing (OIDC), no NPM_TOKEN.
#
# Setup on npmjs.com (once per package):
# Package → byok-observability-mcp → Publishing access / package settings → Trusted Publisher
# → GitHub Actions: owner/repo = alimuratkuslu/byok-observability-mcp, workflow file = ci.yml
# (filename must match this file exactly, case-sensitive)

name: CI

on:
  push:
    branches: ['**']
    tags: ['v*.*.*']

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
      - run: npm ci
      - run: npm run build
      - run: npm run typecheck

  publish:
    needs: build
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write # OIDC → npm Trusted Publishing
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          registry-url: 'https://registry.npmjs.org'
      - run: npm ci
      # Trusted publishing needs npm >= 11.5.1. Avoid `npm install -g npm` on runners — it can break (e.g. MODULE_NOT_FOUND).
      # Run publish with a pinned npm via npx instead.
      - run: npx --yes npm@11.5.1 publish --access public --provenance
        # No NODE_AUTH_TOKEN: OIDC when Trusted Publisher is configured on npmjs.com
