# Build: every push
# Publish: git tag v*.*.* — uses npm Trusted Publishing (OIDC), no NPM_TOKEN.
#
# Setup on npmjs.com (once per package):
# Package → byok-observability-mcp → Publishing access / package settings → Trusted Publisher
# → GitHub Actions: owner/repo = alimuratkuslu/byok-observability-mcp, workflow file = ci.yml
# (filename must match this file exactly, case-sensitive)

name: CI

on:
  push:
    branches: ['**']
    tags: ['v*.*.*']

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
      - run: npm ci
      - run: npm run build
      - run: npm run typecheck

  publish:
    needs: build
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          registry-url: 'https://registry.npmjs.org'
      - run: npm ci
      - name: Sync version from tag
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          npm version "$VERSION" --no-git-tag-version --allow-same-version
      - run: npm publish --access public --provenance
